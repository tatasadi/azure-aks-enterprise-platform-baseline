apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: demo-app
  labels:
    app: sample-api
    environment: dev
    owner: platform-team
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
        environment: dev
        owner: platform-team
        version: v1.0.0
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: demo-sa
      containers:
      - name: sample-api
        image: aksplatformdevacr.azurecr.io/sample-api:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: SECRET_PATH
          value: "/mnt/secrets"
        # Resource requests and limits (required for Azure Policy compliance)
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        # Liveness and readiness probes (best practice and policy compliance)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # Mount secrets from Key Vault via CSI driver
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true
        # Security context (non-privileged container for policy compliance)
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Set to false for now, can be true with proper temp dirs
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-keyvault-provider"
