apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-provider
  namespace: demo-app
  labels:
    app: sample-api
    environment: dev
    owner: platform-team
spec:
  provider: azure
  parameters:
    # Use Workload Identity for authentication (not Pod Identity)
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "f8199a1f-4baa-49f8-8d29-c08ee4e50e6a"

    # Key Vault configuration
    keyvaultName: "aksplatformdevkv"
    cloudName: ""

    # Tenant ID
    tenantId: "77ad5a13-4fbc-4dab-98c8-b96d0c8cf5f0"

    # Secrets to retrieve from Key Vault
    objects: |
      array:
        - |
          objectName: db-connection-string
          objectType: secret
          objectVersion: ""
