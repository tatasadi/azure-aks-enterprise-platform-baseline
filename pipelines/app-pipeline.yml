# Application Pipeline - Build and Deploy Sample API
# This pipeline builds container images and deploys applications to AKS
# Triggers on changes to application code

name: Application-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - app/**
      - pipelines/app-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - app/**

variables:
  - name: dockerRegistryServiceConnection
    value: 'acr-connection'  # Update with your ACR service connection name
  - name: imageRepository
    value: 'sample-api'
  - name: containerRegistry
    value: 'aksplatformdevacr.azurecr.io'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/app/sample-api/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: k8sNamespace
    value: 'demo-app'
  - name: azureServiceConnection
    value: 'azure-aks-platform-sp'  # Update with your service connection name
  - name: aksResourceGroup
    value: 'aksplatform-dev-rg'
  - name: aksClusterName
    value: 'aksplatform-dev-aks'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build and Push Container Image'
    jobs:
      - job: BuildImage
        displayName: 'Build Docker Image'
        steps:
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
              arguments: '--platform linux/amd64'

          - task: Docker@2
            displayName: 'Push Image to ACR'
            inputs:
              command: 'push'
              repository: $(imageRepository)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

          - task: Bash@3
            displayName: 'Security Scan with Trivy'
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                # Install Trivy
                wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
                echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
                sudo apt-get update
                sudo apt-get install trivy -y

                # Scan the image
                trivy image --severity HIGH,CRITICAL \
                  --exit-code 0 \
                  --format table \
                  $(containerRegistry)/$(imageRepository):$(tag)

                echo "##[section]Security scan completed. Review findings above."

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Kubernetes Manifests'
            inputs:
              targetPath: '$(Build.SourcesDirectory)/app/k8s'
              artifact: 'k8s-manifests'
              publishLocation: 'pipeline'

  - stage: ValidateManifests
    displayName: 'Validate Kubernetes Manifests'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: ValidateK8s
        displayName: 'Validate Manifests'
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Manifests'
            inputs:
              buildType: 'current'
              artifactName: 'k8s-manifests'
              targetPath: '$(Pipeline.Workspace)/k8s-manifests'

          - task: Bash@3
            displayName: 'Install kubeval'
            inputs:
              targetType: 'inline'
              script: |
                wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
                tar xf kubeval-linux-amd64.tar.gz
                sudo mv kubeval /usr/local/bin

          - task: Bash@3
            displayName: 'Validate Kubernetes Manifests'
            inputs:
              targetType: 'inline'
              script: |
                cd $(Pipeline.Workspace)/k8s-manifests
                for file in *.yaml; do
                  echo "Validating $file..."
                  kubeval --ignore-missing-schemas "$file"
                done

                echo "##[section]Manifest validation completed successfully"

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: ValidateManifests
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAKS
        displayName: 'Deploy to AKS Dev Cluster'
        environment: 'aks-demo-app-dev'  # Creates approval gate in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Manifests'
                  inputs:
                    buildType: 'current'
                    artifactName: 'k8s-manifests'
                    targetPath: '$(Pipeline.Workspace)/k8s-manifests'

                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(aksResourceGroup) \
                        --name $(aksClusterName) \
                        --overwrite-existing

                - task: Bash@3
                  displayName: 'Update Image Tag in Deployment'
                  inputs:
                    targetType: 'inline'
                    script: |
                      cd $(Pipeline.Workspace)/k8s-manifests

                      # Update the deployment manifest with the new image tag
                      sed -i "s|image: $(containerRegistry)/$(imageRepository):.*|image: $(containerRegistry)/$(imageRepository):$(tag)|g" deployment.yaml

                      echo "Updated deployment.yaml with image tag: $(tag)"
                      grep "image:" deployment.yaml

                - task: Kubernetes@1
                  displayName: 'Apply Namespace'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/namespace.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply ServiceAccount'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/serviceaccount.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply SecretProviderClass'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/secretproviderclass.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply Deployment'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/deployment.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply Service'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/service.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply Ingress'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/ingress.yaml'

                - task: Kubernetes@1
                  displayName: 'Apply PodMonitor'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: $(azureServiceConnection)
                    azureResourceGroup: $(aksResourceGroup)
                    kubernetesCluster: $(aksClusterName)
                    command: 'apply'
                    arguments: '-f $(Pipeline.Workspace)/k8s-manifests/podmonitor.yaml'

                - task: Bash@3
                  displayName: 'Wait for Deployment Rollout'
                  inputs:
                    targetType: 'inline'
                    script: |
                      echo "Waiting for deployment rollout to complete..."
                      kubectl rollout status deployment/sample-api -n $(k8sNamespace) --timeout=5m

                      if [ $? -eq 0 ]; then
                        echo "##[section]Deployment successful!"
                      else
                        echo "##[error]Deployment failed or timed out"
                        exit 1
                      fi

                - task: Bash@3
                  displayName: 'Verify Deployment'
                  inputs:
                    targetType: 'inline'
                    script: |
                      echo "##[section]Deployment Status"
                      kubectl get pods -n $(k8sNamespace)
                      kubectl get svc -n $(k8sNamespace)
                      kubectl get ingress -n $(k8sNamespace)

                      echo ""
                      echo "##[section]Application Logs (last 20 lines)"
                      kubectl logs -n $(k8sNamespace) -l app=sample-api --tail=20

                      echo ""
                      echo "##[section]Get Ingress IP"
                      INGRESS_IP=$(kubectl get ingress -n $(k8sNamespace) sample-api -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                      echo "Application accessible at: http://$INGRESS_IP"
                      echo "Test with: curl -H \"Host: demo.aks.internal\" http://$INGRESS_IP/health"

  - stage: RollbackOnFailure
    displayName: 'Rollback on Failure (Manual)'
    dependsOn: DeployDev
    condition: failed()
    jobs:
      - job: RollbackInstructions
        displayName: 'Rollback Instructions'
        steps:
          - task: Bash@3
            displayName: 'Display Rollback Instructions'
            inputs:
              targetType: 'inline'
              script: |
                echo "##[warning]Deployment failed. To rollback manually:"
                echo "1. Get AKS credentials:"
                echo "   az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName)"
                echo ""
                echo "2. Check deployment history:"
                echo "   kubectl rollout history deployment/sample-api -n $(k8sNamespace)"
                echo ""
                echo "3. Rollback to previous version:"
                echo "   kubectl rollout undo deployment/sample-api -n $(k8sNamespace)"
                echo ""
                echo "4. Monitor rollback:"
                echo "   kubectl rollout status deployment/sample-api -n $(k8sNamespace)"
