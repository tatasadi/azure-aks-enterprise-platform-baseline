---
# Test namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-test
  labels:
    name: ingress-test

---
# Simple test pod
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: ingress-test
  labels:
    app: test-app
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

---
# Service for test pod
apiVersion: v1
kind: Service
metadata:
  name: test-service
  namespace: ingress-test
spec:
  selector:
    app: test-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
# Ingress resource
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress
  namespace: ingress-test
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-service
            port:
              number: 80
