---
# Example SecretProviderClass for Azure Key Vault CSI Driver
# This demonstrates how to mount secrets from Azure Key Vault into pods
# using Azure Workload Identity (OIDC-based authentication)

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: example-keyvault-secrets
  namespace: default  # Change to your application namespace
spec:
  provider: azure
  parameters:
    # Use Workload Identity for authentication (recommended)
    usePodIdentity: "false"
    useVMManagedIdentity: "false"

    # Azure Key Vault details
    keyvaultName: "aksplatformdevkv"
    cloudName: ""  # defaults to AzurePublicCloud

    # Tenant ID (Azure AD directory ID)
    tenantId: "<YOUR_TENANT_ID>"

    # List of secrets to mount from Key Vault
    objects: |
      array:
        - |
          objectName: db-connection-string
          objectType: secret
          objectVersion: ""  # empty = latest version
        - |
          objectName: api-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: storage-account-key
          objectType: secret
          objectVersion: ""

  # Optional: Sync secrets as Kubernetes Secrets
  # Uncomment to create Kubernetes Secret objects from Key Vault secrets
  # secretObjects:
  # - secretName: app-secrets
  #   type: Opaque
  #   data:
  #   - objectName: db-connection-string  # Key Vault secret name
  #     key: connection-string            # Kubernetes secret key
  #   - objectName: api-key
  #     key: api-key

---
# Example ServiceAccount with Workload Identity annotation
# This ServiceAccount must be federated with an Azure Managed Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: example-workload-sa
  namespace: default
  annotations:
    # Replace with your User Assigned Managed Identity client ID
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  labels:
    azure.workload.identity/use: "true"

---
# Example Deployment using the SecretProviderClass
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app-with-secrets
  namespace: default
  labels:
    app: example-app
    environment: dev
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
        environment: dev
        owner: platform-team
        azure.workload.identity/use: "true"  # Required for Workload Identity
    spec:
      serviceAccountName: example-workload-sa

      containers:
      - name: app
        image: nginx:1.25

        # Secrets will be mounted as files in this directory
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true

        # Example: Read secret from mounted file
        env:
        - name: DB_CONNECTION_STRING
          value: "/mnt/secrets/db-connection-string"

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "example-keyvault-secrets"

---
# Setup Instructions:
#
# 1. Create secrets in Azure Key Vault:
#    az keyvault secret set --vault-name aksplatformdevkv --name db-connection-string --value "Server=myserver;Database=mydb"
#    az keyvault secret set --vault-name aksplatformdevkv --name api-key --value "your-api-key-here"
#
# 2. Create Azure User Assigned Managed Identity:
#    az identity create --name example-app-identity --resource-group aksplatform-dev-rg
#
# 3. Get the identity client ID:
#    IDENTITY_CLIENT_ID=$(az identity show --name example-app-identity --resource-group aksplatform-dev-rg --query clientId -o tsv)
#
# 4. Establish federated identity credential (OIDC):
#    az identity federated-credential create \
#      --name example-app-federated-credential \
#      --identity-name example-app-identity \
#      --resource-group aksplatform-dev-rg \
#      --issuer https://<YOUR_OIDC_ISSUER_URL>/ \
#      --subject system:serviceaccount:default:example-workload-sa \
#      --audience api://AzureADTokenExchange
#
# 5. Grant the managed identity access to Key Vault:
#    IDENTITY_PRINCIPAL_ID=$(az identity show --name example-app-identity --resource-group aksplatform-dev-rg --query principalId -o tsv)
#    az role assignment create \
#      --role "Key Vault Secrets User" \
#      --assignee $IDENTITY_PRINCIPAL_ID \
#      --scope /subscriptions/<subscription-id>/resourceGroups/aksplatform-dev-rg/providers/Microsoft.KeyVault/vaults/aksplatformdevkv
#
# 6. Update the ServiceAccount annotation with the client ID:
#    - Replace "00000000-0000-0000-0000-000000000000" with $IDENTITY_CLIENT_ID
#
# 7. Apply the manifests:
#    kubectl apply -f platform/manifests/example-secretproviderclass.yaml
#
# 8. Verify secrets are mounted:
#    kubectl exec -it deployment/example-app-with-secrets -- ls -la /mnt/secrets
#    kubectl exec -it deployment/example-app-with-secrets -- cat /mnt/secrets/db-connection-string
#
# 9. Check CSI driver logs if issues occur:
#    kubectl logs -n kube-system -l app=secrets-store-csi-driver
#    kubectl logs -n kube-system -l app.kubernetes.io/name=secrets-store-provider-azure
